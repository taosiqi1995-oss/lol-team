<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOL 组队平台</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #070b16;
      color: #c8d6f0;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-bottom: 3px solid #c89b3c;
    }

    .header-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Jinx_0.jpg');
      background-size: cover;
      background-position: center 20%;
      filter: brightness(0.32) saturate(1.2);
    }

    .header-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(7,11,22,0.2) 0%,
        rgba(7,11,22,0.05) 40%,
        rgba(7,11,22,0.85) 100%
      );
    }

    .header-content {
      position: relative;
      text-align: center;
      padding: 48px 20px;
      z-index: 1;
    }

    .header-eyebrow {
      font-size: 12px;
      letter-spacing: 8px;
      color: #c89b3c;
      text-transform: uppercase;
      margin-bottom: 18px;
      opacity: 0.9;
    }

    .header-deco {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .deco-line {
      width: 100px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c89b3c);
    }

    .deco-line.r {
      background: linear-gradient(to left, transparent, #c89b3c);
    }

    .deco-diamond {
      width: 7px;
      height: 7px;
      background: #c89b3c;
      transform: rotate(45deg);
      box-shadow: 0 0 8px rgba(200,155,60,0.8);
    }

    header h1 {
      font-size: 64px;
      color: #e8d5a0;
      letter-spacing: 10px;
      line-height: 1;
      margin-bottom: 10px;
      text-shadow:
        0 0 20px rgba(200,155,60,0.9),
        0 0 50px rgba(200,155,60,0.4),
        0 3px 6px rgba(0,0,0,0.9);
    }

    header h2 {
      font-size: 20px;
      color: #a0b8d8;
      letter-spacing: 14px;
      font-weight: 300;
      margin-bottom: 28px;
    }

    .header-tagline {
      font-size: 13px;
      color: #607090;
      letter-spacing: 3px;
      margin-bottom: 36px;
    }

    .post-btn {
      background: linear-gradient(135deg, #c89b3c 0%, #a07828 100%);
      color: #07090f;
      border: none;
      padding: 13px 36px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: all 0.25s;
      box-shadow: 0 0 24px rgba(200,155,60,0.45), 0 4px 12px rgba(0,0,0,0.5);
    }

    .post-btn:hover {
      box-shadow: 0 0 36px rgba(200,155,60,0.7), 0 4px 12px rgba(0,0,0,0.5);
      transform: translateY(-2px);
    }

    .post-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ===== CHAMPION STRIP ===== */
    .champion-strip {
      display: flex;
      background: #040710;
      border-bottom: 2px solid #1a2540;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .champion-strip::-webkit-scrollbar { display: none; }

    .champ {
      flex: 0 0 110px;
      height: 155px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .champ img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      transition: transform 0.35s, filter 0.35s;
      filter: brightness(0.6) saturate(0.7);
    }

    .champ:hover img {
      transform: scale(1.08);
      filter: brightness(0.9) saturate(1.1);
    }

    .champ-name {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 8px 4px 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      font-size: 11px;
      color: #c89b3c;
      text-align: center;
      letter-spacing: 1px;
    }

    .champ::after {
      content: '';
      position: absolute;
      inset: 0;
      border-right: 1px solid rgba(200,155,60,0.08);
      pointer-events: none;
      transition: border-color 0.2s;
    }

    .champ:hover::after { border-color: rgba(200,155,60,0.4); }

    /* ===== FILTER BAR ===== */
    .filter-bar {
      background: #09101f;
      border-bottom: 1px solid #182038;
      padding: 13px 32px;
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-bar label {
      font-size: 11px;
      color: #4a6080;
      letter-spacing: 1px;
    }

    .filter-bar select {
      background: #0d1628;
      color: #c8d6f0;
      border: 1px solid #243358;
      border-radius: 2px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .filter-bar select:focus { border-color: #c89b3c; }

    .clear-btn {
      background: transparent;
      color: #4a6080;
      border: 1px solid #182038;
      padding: 6px 14px;
      border-radius: 2px;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .clear-btn:hover { border-color: #c89b3c; color: #c89b3c; }

    .count { font-size: 12px; color: #304050; margin-left: auto; letter-spacing: 1px; }

    /* ===== MAIN ===== */
    .main { padding: 28px 32px; max-width: 1200px; margin: 0 auto; }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    /* ===== CARDS ===== */
    .post-card {
      background: linear-gradient(145deg, #0c1628 0%, #08101e 100%);
      border: 1px solid #1a2840;
      border-left: 3px solid #c89b3c;
      border-radius: 3px;
      padding: 20px;
      transition: all 0.22s;
      position: relative;
      overflow: hidden;
    }

    .post-card::before {
      content: '';
      position: absolute;
      top: -1px; right: -1px;
      width: 60px; height: 60px;
      background: radial-gradient(circle at top right, rgba(200,155,60,0.07), transparent 70%);
      pointer-events: none;
    }

    .post-card:hover {
      border-color: #2a4068;
      border-left-color: #e8d5a0;
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,155,60,0.15);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .summoner-name {
      font-size: 17px;
      font-weight: bold;
      color: #dccf9a;
      letter-spacing: 0.5px;
    }

    .rank-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 1px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .rank-铁      { background: #200e0e; color: #c08080; border: 1px solid #3a1a1a; }
    .rank-铜      { background: #201408; color: #c8935a; border: 1px solid #3a2810; }
    .rank-银      { background: #101828; color: #a0b8d0; border: 1px solid #1e3040; }
    .rank-金      { background: #201806; color: #c89b3c; border: 1px solid #38300e; }
    .rank-铂金    { background: #081e18; color: #50c8a0; border: 1px solid #103828; }
    .rank-翡翠    { background: #081e10; color: #50c060; border: 1px solid #103818; }
    .rank-钻石    { background: #081438; color: #6080e0; border: 1px solid #102258; }
    .rank-大师    { background: #180628; color: #c060e0; border: 1px solid #2c0e48; }
    .rank-宗师    { background: #1c0614; color: #e060a0; border: 1px solid #340e22; }
    .rank-挑战者  { background: #1c1c08; color: #e8e050; border: 1px solid #343408; }

    .card-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 12px;
    }

    .info-item { font-size: 13px; }
    .info-label { color: #304050; font-size: 11px; letter-spacing: 0.5px; margin-right: 4px; }
    .info-value { color: #8098b8; }

    .position-tag {
      display: inline-block;
      background: #0c1628;
      border: 1px solid #243358;
      color: #6080a8;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .note {
      font-size: 12px;
      color: #445566;
      border-top: 1px solid #14202e;
      padding-top: 10px;
      margin-top: 4px;
      word-break: break-all;
      font-style: italic;
    }

    .time-ago {
      position: absolute;
      top: 12px; right: 14px;
      font-size: 11px;
      color: #243040;
    }

    .empty, .loading {
      text-align: center;
      padding: 80px 0;
      color: #243040;
      font-size: 15px;
      letter-spacing: 2px;
    }

    /* ===== MODAL ===== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 100;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(6px);
    }

    .overlay.show { display: flex; }

    .modal {
      background: linear-gradient(145deg, #0c1628, #08101e);
      border: 1px solid #c89b3c;
      border-radius: 4px;
      padding: 32px;
      width: 500px;
      max-width: 95vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 0 50px rgba(200,155,60,0.18), 0 20px 60px rgba(0,0,0,0.7);
    }

    .modal h2 {
      font-size: 17px;
      color: #c89b3c;
      margin-bottom: 24px;
      letter-spacing: 5px;
      text-align: center;
      padding-bottom: 18px;
      border-bottom: 1px solid #182038;
    }

    .form-group { margin-bottom: 15px; }

    .form-group label {
      display: block;
      font-size: 11px;
      color: #4a6080;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: #07101e;
      color: #c8d6f0;
      border: 1px solid #182038;
      border-radius: 2px;
      padding: 9px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #c89b3c; }

    .form-group textarea { resize: vertical; min-height: 70px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }

    .submit-btn {
      flex: 1;
      background: linear-gradient(135deg, #c89b3c, #a07828);
      color: #07090f;
      border: none;
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 2px;
      cursor: pointer;
      letter-spacing: 3px;
      transition: all 0.2s;
    }

    .submit-btn:hover { box-shadow: 0 0 20px rgba(200,155,60,0.5); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .cancel-btn {
      flex: 1;
      background: transparent;
      color: #4a6080;
      border: 1px solid #182038;
      padding: 12px;
      font-size: 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cancel-btn:hover { border-color: #c89b3c; color: #c89b3c; }

    .error { color: #c04040; font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-bg"></div>
  <div class="header-overlay"></div>
  <div class="header-content">
    <p class="header-eyebrow">League of Legends</p>
    <div class="header-deco">
      <div class="deco-line"></div>
      <div class="deco-diamond"></div>
      <div class="deco-line r"></div>
    </div>
    <h1>英雄联盟</h1>
    <h2>组　队　平　台</h2>
    <p class="header-tagline">找到你的队友，征服召唤师峡谷</p>
    <button class="post-btn" onclick="openModal()">＋ 发布组队帖</button>
  </div>
</header>

<!-- CHAMPION STRIP -->
<div class="champion-strip">
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Ahri_0.jpg" alt="阿狸"><div class="champ-name">阿狸</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Yasuo_0.jpg" alt="亚索"><div class="champ-name">亚索</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Zed_0.jpg" alt="劫"><div class="champ-name">劫</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Jinx_0.jpg" alt="金克丝"><div class="champ-name">金克丝</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Thresh_0.jpg" alt="锤石"><div class="champ-name">锤石</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/LeeSin_0.jpg" alt="李青"><div class="champ-name">李青</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Lux_0.jpg" alt="拉克丝"><div class="champ-name">拉克丝</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Vi_0.jpg" alt="蔚"><div class="champ-name">蔚</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Ezreal_0.jpg" alt="伊泽瑞尔"><div class="champ-name">伊泽瑞尔</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Nautilus_0.jpg" alt="诺提勒斯"><div class="champ-name">诺提勒斯</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Caitlyn_0.jpg" alt="凯特琳"><div class="champ-name">凯特琳</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Ekko_0.jpg" alt="艾克"><div class="champ-name">艾克</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Darius_0.jpg" alt="德莱厄斯"><div class="champ-name">德莱厄斯</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/Syndra_0.jpg" alt="辛德拉"><div class="champ-name">辛德拉</div></div>
  <div class="champ"><img src="https://ddragon.leagueoflegends.com/cdn/img/champion/loading/KhaZix_0.jpg" alt="卡兹克"><div class="champ-name">卡兹克</div></div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <label>段位</label>
  <select id="filterRank" onchange="renderPosts()">
    <option value="">全部段位</option>
    <option>铁</option><option>铜</option><option>银</option>
    <option>金</option><option>铂金</option><option>翡翠</option>
    <option>钻石</option><option>大师</option><option>宗师</option><option>挑战者</option>
  </select>

  <label>位置</label>
  <select id="filterPos" onchange="renderPosts()">
    <option value="">全部位置</option>
    <option>上单</option><option>打野</option><option>中单</option>
    <option>下路</option><option>辅助</option>
  </select>

  <label>大区</label>
  <select id="filterServer" onchange="renderPosts()">
    <option value="">全部大区</option>
    <option>艾欧尼亚</option><option>祖安</option><option>诺克萨斯</option>
    <option>班德尔城</option><option>皮尔特沃夫</option><option>战争学院</option>
    <option>巨神峰</option><option>雷瑟守备</option><option>裁决之地</option>
    <option>黑色玫瑰</option><option>影流</option><option>守望之海</option>
    <option>征服之海</option><option>平静之湾</option><option>扭曲丛林</option>
    <option>深渊</option>
  </select>

  <button class="clear-btn" onclick="clearFilters()">清除筛选</button>
  <span class="count" id="countLabel"></span>
</div>

<div class="main">
  <div class="posts-grid" id="postsGrid">
    <div class="loading" style="grid-column:1/-1">加载中...</div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2>发 布 组 队 帖</h2>
    <form id="postForm" onsubmit="submitPost(event)">
      <div class="form-row">
        <div class="form-group">
          <label>召唤师名字 *</label>
          <input type="text" id="name" placeholder="你的游戏ID" maxlength="20">
          <div class="error" id="nameErr"></div>
        </div>
        <div class="form-group">
          <label>游戏大区 *</label>
          <select id="server">
            <option value="">请选择</option>
            <option>艾欧尼亚</option><option>祖安</option><option>诺克萨斯</option>
            <option>班德尔城</option><option>皮尔特沃夫</option><option>战争学院</option>
            <option>巨神峰</option><option>雷瑟守备</option><option>裁决之地</option>
            <option>黑色玫瑰</option><option>影流</option><option>守望之海</option>
            <option>征服之海</option><option>平静之湾</option><option>扭曲丛林</option>
            <option>深渊</option>
          </select>
          <div class="error" id="serverErr"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>当前段位 *</label>
          <select id="rank">
            <option value="">请选择</option>
            <option>铁</option><option>铜</option><option>银</option>
            <option>金</option><option>铂金</option><option>翡翠</option>
            <option>钻石</option><option>大师</option><option>宗师</option><option>挑战者</option>
          </select>
          <div class="error" id="rankErr"></div>
        </div>
        <div class="form-group">
          <label>想打的位置 *</label>
          <select id="position">
            <option value="">请选择</option>
            <option>上单</option><option>打野</option><option>中单</option>
            <option>下路</option><option>辅助</option><option>不限</option>
          </select>
          <div class="error" id="posErr"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>游戏时间 *</label>
          <input type="text" id="gameTime" placeholder="如：晚上8点-12点" maxlength="30">
          <div class="error" id="timeErr"></div>
        </div>
        <div class="form-group">
          <label>招募人数 *</label>
          <select id="need">
            <option value="">请选择</option>
            <option>1人</option><option>2人</option><option>3人</option>
            <option>4人</option><option>5人</option>
          </select>
          <div class="error" id="needErr"></div>
        </div>
      </div>

      <div class="form-group">
        <label>备注（选填）</label>
        <textarea id="note" placeholder="如：只打排位、不带萌新、语音交流……" maxlength="100"></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="cancel-btn" onclick="closeModal()">取消</button>
        <button type="submit" class="submit-btn" id="submitBtn">发 布</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB3oY2yGXpfevEk9jWWuFZKLlDYoPe8sjM",
    authDomain: "lol-team-35920.firebaseapp.com",
    projectId: "lol-team-35920",
    storageBucket: "lol-team-35920.firebasestorage.app",
    messagingSenderId: "537121312614",
    appId: "1:537121312614:web:39755aef419d576810c2a7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function timeAgo(ts) {
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    return Math.floor(diff / 86400) + '天前';
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  window.renderPosts = async function() {
    const rank = document.getElementById('filterRank').value;
    const pos = document.getElementById('filterPos').value;
    const server = document.getElementById('filterServer').value;
    const grid = document.getElementById('postsGrid');
    const label = document.getElementById('countLabel');

    grid.innerHTML = '<div class="loading" style="grid-column:1/-1">加载中...</div>';

    try {
      const q = query(collection(db, 'posts'), orderBy('ts', 'desc'));
      const snapshot = await getDocs(q);
      let posts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

      if (rank) posts = posts.filter(p => p.rank === rank);
      if (pos) posts = posts.filter(p => p.position === pos || p.position === '不限');
      if (server) posts = posts.filter(p => p.server === server);

      label.textContent = `共 ${posts.length} 条`;

      if (posts.length === 0) {
        grid.innerHTML = '<div class="empty" style="grid-column:1/-1">暂无组队帖，来发一个吧</div>';
        return;
      }

      grid.innerHTML = posts.map(p => `
        <div class="post-card">
          <span class="time-ago">${timeAgo(p.ts)}</span>
          <div class="card-header">
            <span class="summoner-name">${esc(p.name)}</span>
            <span class="rank-badge rank-${p.rank}">${esc(p.rank)}</span>
          </div>
          <div class="card-info">
            <div class="info-item">
              <span class="info-label">位置</span>
              <span class="position-tag">${esc(p.position)}</span>
            </div>
            <div class="info-item">
              <span class="info-label">招募</span>
              <span class="info-value">${esc(p.need)}</span>
            </div>
            <div class="info-item">
              <span class="info-label">大区</span>
              <span class="info-value">${esc(p.server || '未知')}</span>
            </div>
            <div class="info-item">
              <span class="info-label">时间</span>
              <span class="info-value">${esc(p.gameTime)}</span>
            </div>
          </div>
          ${p.note ? `<div class="note">${esc(p.note)}</div>` : ''}
        </div>
      `).join('');
    } catch (e) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1">加载失败，请刷新重试</div>';
      console.error(e);
    }
  };

  window.openModal = function() {
    document.getElementById('overlay').classList.add('show');
    document.getElementById('name').focus();
  };

  window.closeModal = function() {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('postForm').reset();
    ['nameErr','serverErr','rankErr','posErr','timeErr','needErr'].forEach(id => {
      document.getElementById(id).textContent = '';
    });
  };

  window.handleOverlayClick = function(e) {
    if (e.target === document.getElementById('overlay')) window.closeModal();
  };

  window.clearFilters = function() {
    document.getElementById('filterRank').value = '';
    document.getElementById('filterPos').value = '';
    document.getElementById('filterServer').value = '';
    window.renderPosts();
  };

  window.submitPost = async function(e) {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const server = document.getElementById('server').value;
    const rank = document.getElementById('rank').value;
    const position = document.getElementById('position').value;
    const gameTime = document.getElementById('gameTime').value.trim();
    const need = document.getElementById('need').value;
    const note = document.getElementById('note').value.trim();

    let valid = true;
    const setErr = (id, msg) => { document.getElementById(id).textContent = msg; valid = false; };
    const clrErr = (id) => document.getElementById(id).textContent = '';

    name     ? clrErr('nameErr')   : setErr('nameErr',   '请填写召唤师名字');
    server   ? clrErr('serverErr') : setErr('serverErr', '请选择大区');
    rank     ? clrErr('rankErr')   : setErr('rankErr',   '请选择段位');
    position ? clrErr('posErr')    : setErr('posErr',    '请选择位置');
    gameTime ? clrErr('timeErr')   : setErr('timeErr',   '请填写游戏时间');
    need     ? clrErr('needErr')   : setErr('needErr',   '请选择招募人数');

    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '发布中...';

    try {
      await addDoc(collection(db, 'posts'), {
        name, server, rank, position, gameTime, need, note,
        ts: Date.now()
      });
      window.closeModal();
      await window.renderPosts();
    } catch (err) {
      alert('发布失败，请重试');
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = '发 布';
    }
  };

  window.renderPosts();
</script>
</body>
</html>
